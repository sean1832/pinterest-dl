name: Integration (live Pinterest API)

# Canary run against the real Pinterest API so we get alerted when the
# unofficial API drifts. Runs monthly and on demand only, never on push, to
# keep load on Pinterest negligible.
on:
  schedule:
    - cron: "0 6 1 * *" # Mondays 06:00 UTC on the 1st of every month
  workflow_dispatch:

jobs:
  integration:
    name: Run live integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -m integration -v
